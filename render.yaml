services:
  - type: web
    name: task-management-system
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/Project-2-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: task-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: task-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: task-db
          property: password
      - key: JAVA_VERSION
        value: 21

databases:
  - name: task-db
    databaseName: task_management
    user: task_user
