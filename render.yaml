services:
  - type: web
    name: task-management-system
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: task-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: task-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: task-db
          property: password

databases:
  - name: task-db
    databaseName: task_management
    user: task_user
